name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./Web-app-pipeline-e2e
          file: ./Web-app-pipeline-e2e/Dockerfile
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/web-app-sprint1:${{ github.sha }}

      - name: Smoke test container
        run: |
          docker run -d --name webapp-smoke-test -p 8080:3000 \
            ${{ steps.login-ecr.outputs.registry }}/web-app-sprint1:${{ github.sha }}
          timeout=30
          until curl -fs http://localhost:8080; do
            timeout=$((timeout-1))
            if [ "$timeout" -le 0 ]; then
              echo "Application did not start in time"
              docker logs webapp-smoke-test || true
              docker stop webapp-smoke-test || true
              docker rm webapp-smoke-test || true
              exit 1
            fi
            sleep 1
          done
          curl -f http://localhost:8080
          docker stop webapp-smoke-test
          docker rm webapp-smoke-test
